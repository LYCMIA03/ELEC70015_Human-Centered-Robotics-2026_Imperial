base_global_planner: "navfn/NavfnROS"
base_local_planner: "dwa_local_planner/DWAPlannerROS"

planner_frequency: 1.0
controller_frequency: 10.0
planner_patience: 10.0
controller_patience: 10.0
max_planning_retries: 3

recovery_behavior_enabled: true
clearing_rotation_allowed: true
shutdown_costmaps: false

NavfnROS:
  allow_unknown: true
  default_tolerance: 0.1
  visualize_potential: false

DWAPlannerROS:
  # P3-AT skid-steer like limits, tune to match your sim/real robot
  max_vel_x: 0.5
  min_vel_x: -0.1
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.5
  min_vel_trans: 0.05
  max_vel_theta: 1.0
  min_vel_theta: 0.0

  acc_lim_x: 0.6
  acc_lim_y: 0.0
  acc_lim_theta: 1.5

  vx_samples: 12
  vy_samples: 1
  vtheta_samples: 20
  sim_time: 1.7
  sim_granularity: 0.025

  path_distance_bias: 24.0
  goal_distance_bias: 36.0
  occdist_scale: 0.05
  forward_point_distance: 0.2

  xy_goal_tolerance: 0.55
  yaw_goal_tolerance: 0.5
  latch_xy_goal_tolerance: true

  stop_time_buffer: 0.3
  oscillation_reset_dist: 0.25
