# Global costmap for local-only planning with RPLIDAR A2M12 (no /map required)
global_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 2.0
  publish_frequency: 1.0
  transform_tolerance: 0.5
  static_map: false
  rolling_window: true
  width: 20.0
  height: 20.0
  resolution: 0.05
  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  obstacle_layer:
    observation_sources: rplidar_scan_sensor
    rplidar_scan_sensor:
      sensor_frame: laser
      data_type: LaserScan
      topic: scan_filtered
      marking: true
      clearing: true
      inf_is_valid: true
      obstacle_range: 5.0
      raytrace_range: 8.0

  inflation_layer:
    inflation_radius: 0.3
    cost_scaling_factor: 5.0
