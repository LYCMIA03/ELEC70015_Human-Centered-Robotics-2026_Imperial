# slam_gmapping parameters for RPLIDAR A2M12
base_frame: base_link
odom_frame: odom
map_frame: map
map_update_interval: 2.0

xmin: -15.0
xmax: 15.0
ymin: -15.0
ymax: 15.0
delta: 0.05

# A2M12 max range is 12m, use conservative usable range.
maxUrange: 10.0
maxRange: 12.0

sigma: 0.05
kernelSize: 1
lstep: 0.05
astep: 0.05
iterations: 5
lsigma: 0.075
ogain: 3.0
lskip: 0

srr: 0.1
srt: 0.2
str: 0.1
stt: 0.2

linearUpdate: 0.15
angularUpdate: 0.15
temporalUpdate: 0.5
resampleThreshold: 0.5

particles: 50
minimumScore: 50
