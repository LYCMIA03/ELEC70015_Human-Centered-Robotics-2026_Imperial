local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 10.0
  publish_frequency: 5.0
  transform_tolerance: 0.5
  static_map: false
  rolling_window: true
  width: 10.0
  height: 10.0
  resolution: 0.05
  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  obstacle_layer:
    observation_sources: unitree_scan_sensor
    unitree_scan_sensor:
      sensor_frame: unitree_lidar
      data_type: LaserScan
      topic: unitree/scan
      marking: true
      clearing: true
      inf_is_valid: true
      obstacle_range: 6.0
      raytrace_range: 8.0

  inflation_layer:
    inflation_radius: 0.55
    cost_scaling_factor: 3.0
