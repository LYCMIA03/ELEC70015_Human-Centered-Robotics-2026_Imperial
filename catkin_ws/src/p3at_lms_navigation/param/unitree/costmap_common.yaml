# Common costmap parameters for P3-AT with Unitree 4D Lidar L1
# Extended ranges due to 360° FOV and 30m max range
obstacle_range: 6.0
raytrace_range: 8.0

# Increase side clearance for real robot attachments that can occlude
# left/right lidar visibility during in-place turns.
footprint: [[0.32, 0.32], [0.32, -0.32], [-0.32, -0.32], [-0.32, 0.32]]
footprint_padding: 0.08
inflation_radius: 0.3
cost_scaling_factor: 5.0

transform_tolerance: 0.4
