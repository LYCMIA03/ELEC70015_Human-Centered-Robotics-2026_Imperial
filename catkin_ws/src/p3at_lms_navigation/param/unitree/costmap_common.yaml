# Common costmap parameters for P3-AT with Unitree 4D Lidar L1
# Extended ranges due to 360° FOV and 30m max range
obstacle_range: 6.0
raytrace_range: 8.0

# P3-AT footprint (same as original)
footprint: [[0.32, 0.27], [0.32, -0.27], [-0.32, -0.27], [-0.32, 0.27]]
footprint_padding: 0.02
inflation_radius: 0.45
cost_scaling_factor: 5.0

transform_tolerance: 0.4
