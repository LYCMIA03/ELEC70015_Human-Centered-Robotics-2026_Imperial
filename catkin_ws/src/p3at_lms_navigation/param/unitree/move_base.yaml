# move_base parameters — same as original, optimized for Unitree 4D Lidar L1
# The planner parameters are robot-specific (P3-AT), not lidar-specific
base_global_planner: "navfn/NavfnROS"
base_local_planner: "dwa_local_planner/DWAPlannerROS"

planner_frequency: 1.0
controller_frequency: 10.0
planner_patience: 15.0
controller_patience: 20.0
max_planning_retries: 5

recovery_behavior_enabled: true
clearing_rotation_allowed: true
shutdown_costmaps: false

NavfnROS:
  allow_unknown: true
  default_tolerance: 0.15
  visualize_potential: false

DWAPlannerROS:
  # Allow a bit more reverse motion because this platform often needs a
  # meaningful backward adjustment before it can steer away from obstacles.
  # DWA has no explicit "reverse distance" knob, so we increase the reverse
  # velocity bound and slightly extend the simulation horizon instead.
  max_vel_x: 0.26
  min_vel_x: -0.10
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.26
  min_vel_trans: 0.02
  # Raise linear/angular limits slightly so exploration covers space faster
  # while staying well below aggressive indoor speeds.
  max_vel_theta: 0.45
  min_vel_theta: 0.0

  acc_lim_x: 0.35
  acc_lim_y: 0.0
  acc_lim_theta: 0.75

  vx_samples: 20
  vy_samples: 1
  vtheta_samples: 40
  sim_time: 3.0
  sim_granularity: 0.025

  path_distance_bias: 32.0
  goal_distance_bias: 24.0
  occdist_scale: 0.08
  forward_point_distance: 0.25

  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.3
  latch_xy_goal_tolerance: true

  stop_time_buffer: 0.4
  oscillation_reset_dist: 0.10
