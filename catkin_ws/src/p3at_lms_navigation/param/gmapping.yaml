# slam_gmapping parameters
base_frame: base_link
odom_frame: odom
map_frame: map
map_update_interval: 2.0

# Keep the published map reasonably small so move_base + rviz stay responsive.
# The included Gazebo world is compact.
xmin: -10.0
xmax: 10.0
ymin: -10.0
ymax: 10.0
delta: 0.05
maxUrange: 8.0
maxRange: 12.0
sigma: 0.05
kernelSize: 1
lstep: 0.05
astep: 0.05
iterations: 5
lsigma: 0.075
ogain: 3.0
lskip: 0

srr: 0.1
srt: 0.2
str: 0.1
stt: 0.2

linearUpdate: 0.2
angularUpdate: 0.2
temporalUpdate: 0.5
resampleThreshold: 0.5
particles: 30
